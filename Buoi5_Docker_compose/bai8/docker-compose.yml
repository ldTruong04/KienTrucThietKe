services:
  mysql:
    image: mysql:8.0
    container_name: mysql_bai8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: mydb
    volumes:
      - mysql_data:/var/lib/mysql

  nodejs:
    build: .
    container_name: nodejs_bai8
    restart: always
    ports:
      - "3001:3000"
    environment:
      DB_HOST: mysql
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: mydb
    depends_on:
      - mysql

volumes:
  mysql_data:
