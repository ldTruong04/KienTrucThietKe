version: '3.8'

services:
  elasticsearch:
    image: elasticsearch:8.10.2
    container_name: elasticsearch_bai7
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=elasticpassword
      - xpack.security.enabled=true
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elk_network

  kibana:
    image: kibana:8.10.2
    container_name: kibana_bai7
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=elasticpassword
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elk_network

volumes:
  es_data:

networks:
  elk_network:
    driver: bridge
