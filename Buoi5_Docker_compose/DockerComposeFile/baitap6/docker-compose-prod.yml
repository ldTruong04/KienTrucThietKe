# Production mode - built image served behind Nginx
services:
  app:
    build: ./app
    container_name: bt6_app_prod
    restart: always
    environment:
      FLASK_ENV: production
    networks:
      - prod_network

  nginx:
    image: nginx:latest
    container_name: bt6_nginx_prod
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - prod_network

networks:
  prod_network:
    driver: bridge
